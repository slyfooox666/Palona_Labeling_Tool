model_id: rf_detr_default
kind: detector
adapter: vision_pipeline.models.rf_detr.RFDETRDetector

runtime:
  mode: local
  device: cuda
  endpoint_env: RF_DETR_ENDPOINT
  model_size: large
  weights_path: ""
  optimize_for_inference: false

inference:
  input_size: 704
  batch_size: 1
  confidence_threshold: 0.45
  nms_threshold: 0.5
  include_source_image: false

classes:
  allow: []
  deny: []
